<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WKT → CSV (lat,lon)</title>
<style>
body { font-family: sans-serif; padding: 20px; }
textarea { width: 100%; height: 180px; margin-bottom: 10px; }
button { padding: 10px 15px; margin-right: 10px; }
</style>
</head>
<body>

<h3>Load CSV file</h3>
<input type="file" id="fileInput" accept=".csv">

<h3>Or paste CSV</h3>
<textarea id="input" placeholder="Paste CSV here..."></textarea>

<button onclick="convert()">Convert</button>
<button onclick="download()">Download CSV</button>

<h3>Output CSV (lat,lon)</h3>
<textarea id="output"></textarea>

<script>
function parseCSV(text) {
  const lines = text.split('\n');
  const out = ['lat,lon'];

  for (let line of lines) {
    const match = line.match(/POINT\s*\(\s*([0-9.\-]+)\s+([0-9.\-]+)\s*\)/);
    if (!match) continue;

    const lon = match[1];
    const lat = match[2];

    out.push(`${lat},${lon}`);
  }

  return out.join('\n');
}

function convert() {
  const input = document.getElementById('input').value;
  document.getElementById('output').value = parseCSV(input);
}

function download() {
  const content = document.getElementById('output').value;
  const blob = new Blob([content], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'converted.csv';
  a.click();

  URL.revokeObjectURL(url);
}

// File loader
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    document.getElementById('input').value = event.target.result;
  };
  reader.readAsText(file);
});
</script>

</body>
</html>
